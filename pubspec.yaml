name: therapii
description: "A new Flutter project."
publish_to: "none"

version: 1.0.20+20

environment:
  sdk: ^3.6.0
dependencies:
  provider: ^6.0.0
  intl: 0.20.2
  url_launcher: any
  http: any
  font_awesome_flutter: any
  path_provider: any
  record: '>=5.1.2'
  cloud_functions: any
  shimmer: any
  file_selector: any
  # file_picker_web removed
  firebase_storage: any
  file_picker: '>=8.1.2'
  just_audio: any
  tutorial_coach_mark: any
  shared_preferences: any
  flutter_tts: any
  speech_to_text: any
  flutter:
    sdk: flutter
  cupertino_icons: any
  google_fonts: any
  firebase_core: '>=2.21.1'
  firebase_auth: '>=5.3.3'
  cloud_firestore: '>=5.5.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.otf
        - asset: assets/fonts/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.otf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.otf
          weight: 900
        - asset: assets/fonts/Satoshi-Light.otf
          weight: 300
        - asset: assets/fonts/Satoshi-Italic.otf
          style: italic
        - asset: assets/fonts/Satoshi-MediumItalic.otf
          style: italic
          weight: 500
        - asset: assets/fonts/Satoshi-BoldItalic.otf
          style: italic
          weight: 700
        - asset: assets/fonts/Satoshi-BlackItalic.otf
          style: italic
          weight: 900
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Therapii_image.png
  remove_alpha_ios: true
